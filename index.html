<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resort Daily Inventory System</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">🏨</div>
      <div>
        <div class="topbar-title">Resort Inventory</div>
      </div>
    </div>
    <div class="topbar-date" id="top-date"></div>
    <div class="topbar-right">
      <div class="view-toggle">
        <button class="view-btn active" onclick="setView('form')" id="btn-form">Entry Form</button>
        <button class="view-btn" onclick="setView('report')" id="btn-report">Summary & Alerts</button>
      </div>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-label">Departments</div>
      <button class="dept-btn active" onclick="setDept('housekeeping')" id="tab-housekeeping">
        <span class="dept-icon">🧹</span> Housekeeping
        <span class="dept-badge" id="badge-housekeeping">—</span>
      </button>
      <button class="dept-btn" onclick="setDept('bar')" id="tab-bar">
        <span class="dept-icon">🍹</span> Bar
        <span class="dept-badge" id="badge-bar">—</span>
      </button>
      <button class="dept-btn" onclick="setDept('kitchen')" id="tab-kitchen">
        <span class="dept-icon">🍽️</span> Kitchen
        <span class="dept-badge" id="badge-kitchen">—</span>
      </button>
      <button class="dept-btn" onclick="setDept('pizzeria')" id="tab-pizzeria">
        <span class="dept-icon">🍕</span> Pizzeria
        <span class="dept-badge" id="badge-pizzeria">—</span>
      </button>
    </nav>

    <main class="main" id="main-content"></main>
  </div>

  <script src="app-firebase.js"></script>
</body>
</html>
